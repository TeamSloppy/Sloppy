name: CI

env:
  SWIFT_ACTIONS_VERSION: "6.2.1"

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    name: Swift Tests
    # Temporarily disabled.
    if: ${{ false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ADAENGINE_HEADLESS: "1"
      ADAENGINE_DISABLE_SWAN: "1"
    container:
      image: swift:6.2-jammy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y libsqlite3-dev

      - name: Swift Version
        run: swift --version

      - name: Resolve Swift Packages
        run: swift package resolve

      - name: Run Test Suite
        timeout-minutes: 25
        run: |
          # Swift Testing's parallel console recorder can deadlock under heavy log output.
          swift test --no-parallel --xunit-output swift-test-results.xml > swift-test.log 2>&1 || {
            status=$?
            tail -n 1000 swift-test.log
            exit "$status"
          }
          tail -n 120 swift-test.log

      - name: Upload Swift Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-test-linux-logs
          path: |
            swift-test.log
            swift-test-results.xml
          if-no-files-found: ignore

  swift-test-macos:
    name: Swift Tests (macOS)
    # Temporarily disabled.
    if: ${{ false }}
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_ACTIONS_VERSION }}

      - name: Swift Version
        run: swift --version

      - name: Resolve Swift Packages
        run: swift package resolve

      - name: Run macOS Smoke Tests
        timeout-minutes: 20
        run: |
          # Linux runs the full suite; macOS covers Darwin/AppKit-sensitive paths.
          swift test --no-parallel \
            --filter "SloppyTUIThemeTests|DashboardTerminalTests|DesktopNotificationTests|CoreMainTests" \
            --xunit-output swift-test-results.xml > swift-test.log 2>&1 || {
            status=$?
            tail -n 1000 swift-test.log
            exit "$status"
          }
          tail -n 120 swift-test.log

      - name: Upload Swift Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-test-macos-logs
          path: |
            swift-test.log
            swift-test-results.xml
          if-no-files-found: ignore

  swift-build:
    name: Swift Build
    runs-on: ubuntu-latest
    env:
      ADAENGINE_HEADLESS: "1"
      ADAENGINE_DISABLE_SWAN: "1"
    container:
      image: swift:6.2-jammy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y libsqlite3-dev

      - name: Build sloppy (Release)
        run: swift build -c release --product sloppy

      - name: Build SloppyNode (Release)
        run: swift build -c release --product SloppyNode

  swift-build-macos:
    name: Swift Build (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_ACTIONS_VERSION }}

      - name: Swift Version
        run: swift --version

      - name: Build sloppy (Release)
        run: swift build -c release --product sloppy

      - name: Build SloppyNode (Release)
        run: swift build -c release --product SloppyNode

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dashboard Dependencies
        working-directory: Dashboard
        run: npm install

      - name: Build Dashboard
        working-directory: Dashboard
        run: npm run build

  dashboard-happy-path:
    name: Dashboard Happy Path
    runs-on: ubuntu-latest
    needs:
      - swift-build
      - dashboard-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dashboard Dependencies
        working-directory: Dashboard
        run: npm install

      - name: Install Chromium
        working-directory: Dashboard
        run: npx playwright install --with-deps chromium

      - name: Start sloppy and Dashboard
        run: docker compose -f utils/docker/docker-compose.yml up -d --build

      - name: Wait For sloppy
        run: |
          timeout 180 bash -lc 'until curl -fsS http://127.0.0.1:25101/v1/config >/dev/null; do sleep 2; done'

      - name: Wait For Dashboard
        run: |
          timeout 180 bash -lc 'until curl -fsS http://127.0.0.1:25102 >/dev/null; do sleep 2; done'

      - name: Seed Happy Path Data
        working-directory: Dashboard
        run: npm run seed:happy-path

      - name: Run Dashboard Happy Path
        working-directory: Dashboard
        run: npm run e2e:happy-path

      - name: Capture Docker Logs
        if: failure()
        run: |
          mkdir -p Dashboard/output/playwright/happy-path
          docker compose -f utils/docker/docker-compose.yml logs --no-color > Dashboard/output/playwright/happy-path/docker-compose.log

      - name: Upload Happy Path Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-happy-path-artifacts
          path: Dashboard/output/playwright/happy-path

      - name: Stop sloppy and Dashboard
        if: always()
        run: docker compose -f utils/docker/docker-compose.yml down -v
