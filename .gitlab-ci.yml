stages:
  - verify
  - deploy

default:
  interruptible: true

variables:
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

docs:build:
  stage: verify
  image: node:20-bookworm-slim
  cache:
    key: docs-npm
    paths:
      - .cache/npm
      - docs/node_modules/
  before_script:
    - node --version
    - npm --version
    - cd docs && npm install
  script:
    - cd docs && npm run build
  artifacts:
    paths:
      - docs/.vitepress/dist/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

docs:publish:
  stage: deploy
  image: node:20-bookworm-slim
  needs:
    - job: docs:build
      artifacts: true
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates git rsync
  script:
    - ./utils/docs/publish-to-github-pages.sh docs/.vitepress/dist
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
