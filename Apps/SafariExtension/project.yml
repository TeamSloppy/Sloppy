name: SafariExtension

options:
  bundleIdPrefix: team.sloppy
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
    visionOS: "1.0"
  createIntermediateGroups: true

packages:
  SafariExtension:
    path: .

targets:
  SafariExtension-macOS:
    type: application
    platform: macOS
    sources:
      - Sources/SafariExtensionApp
    dependencies:
      - package: SafariExtension
        product: SafariExtensionCore
      - target: SafariExtensionWebExtension-macOS
    info:
      path: SupportingFiles/macOS/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.safariextension
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: SafariExtension
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: SafariExtension connects to Sloppy Core on your local network.
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
        ENABLE_HARDENED_RUNTIME: YES

  SafariExtension-iOS:
    type: application
    platform: iOS
    sources:
      - Sources/SafariExtensionApp
    dependencies:
      - package: SafariExtension
        product: SafariExtensionCore
      - target: SafariExtensionWebExtension-iOS
    info:
      path: SupportingFiles/iOS/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.safariextension
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: SafariExtension
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: SafariExtension connects to Sloppy Core on your local network.
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES

  SafariExtension-iPadOS:
    type: application
    platform: iOS
    sources:
      - Sources/SafariExtensionApp
    dependencies:
      - package: SafariExtension
        product: SafariExtensionCore
      - target: SafariExtensionWebExtension-iOS
    info:
      path: SupportingFiles/iOS/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.safariextension
        TARGETED_DEVICE_FAMILY: "2"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: SafariExtension
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: SafariExtension connects to Sloppy Core on your local network.
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES

  SafariExtension-visionOS:
    type: application
    platform: visionOS
    sources:
      - Sources/SafariExtensionApp
    dependencies:
      - package: SafariExtension
        product: SafariExtensionCore
      - target: SafariExtensionWebExtension-visionOS
    info:
      path: SupportingFiles/visionOS/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.safariextension
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: SafariExtension
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: SafariExtension connects to Sloppy Core on your local network.
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES

  SafariExtensionWebExtension-macOS:
    type: app-extension
    platform: macOS
    sources:
      - Extension/Resources
    info:
      path: SupportingFiles/WebExtension/macOS/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.safariextension.webextension
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: SafariExtension
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.Safari.web-extension

  SafariExtensionWebExtension-iOS:
    type: app-extension
    platform: iOS
    sources:
      - Extension/Resources
    info:
      path: SupportingFiles/WebExtension/iOS/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.safariextension.webextension
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: SafariExtension
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.Safari.web-extension

  SafariExtensionWebExtension-visionOS:
    type: app-extension
    platform: visionOS
    sources:
      - Extension/Resources
    info:
      path: SupportingFiles/WebExtension/visionOS/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.safariextension.webextension
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: SafariExtension
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.Safari.web-extension

schemes:
  SafariExtension-macOS:
    build:
      targets:
        SafariExtension-macOS: all
    run:
      config: Debug
      executable: SafariExtension-macOS
    archive:
      config: Release
