name: SloppySafari

options:
  bundleIdPrefix: team.sloppy
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
    visionOS: "1.0"
  createIntermediateGroups: true
  fileTypes:
    icon:
      file: true

packages:
  SloppySafari:
    path: .

targets:
  SloppySafari-macOS:
    type: application
    platform: macOS
    sources:
      - Sources/SloppySafariApp
      - Assets.xcassets
      - sloppy.icon
    dependencies:
      - package: SloppySafari
        product: SloppySafariCore
      - target: SloppySafariWebExtension-macOS
    info:
      path: SupportingFiles/macOS/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.sloppysafari
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: sloppy
        INFOPLIST_KEY_CFBundleDisplayName: SloppySafari
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: SloppySafari connects to Sloppy Core on your local network.
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
        ENABLE_HARDENED_RUNTIME: YES

  SloppySafari-iOS:
    type: application
    platform: iOS
    sources:
      - Sources/SloppySafariApp
      - Assets.xcassets
      - sloppy.icon
    dependencies:
      - package: SloppySafari
        product: SloppySafariCore
      - target: SloppySafariWebExtension-iOS
    info:
      path: SupportingFiles/iOS/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.sloppysafari
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: sloppy
        INFOPLIST_KEY_CFBundleDisplayName: SloppySafari
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: SloppySafari connects to Sloppy on your local network.
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES

  SloppySafari-visionOS:
    type: application
    platform: visionOS
    sources:
      - Sources/SloppySafariApp
      - Assets.xcassets
      - sloppy.icon
    dependencies:
      - package: SloppySafari
        product: SloppySafariCore
      - target: SloppySafariWebExtension-visionOS
    info:
      path: SupportingFiles/visionOS/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.sloppysafari
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: sloppy
        INFOPLIST_KEY_CFBundleDisplayName: SloppySafari
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: SloppySafari connects to Sloppy on your local network.
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES

  SloppySafariWebExtension-macOS:
    type: app-extension
    platform: macOS
    sources:
      - Extension/Native
      - Extension/Resources
    info:
      path: SupportingFiles/WebExtension/macOS/Info.plist
      properties:
        CFBundleDisplayName: SloppySafari
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        SFSafariCorrespondingIOSAppBundleIdentifier: team.sloppy.sloppysafari
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: SupportingFiles/WebExtension/macOS/SloppySafariWebExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.sloppysafari.webextension
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: SloppySafari

  SloppySafariWebExtension-iOS:
    type: app-extension
    platform: iOS
    sources:
      - Extension/Native
      - Extension/Resources
    info:
      path: SupportingFiles/WebExtension/iOS/Info.plist
      properties:
        CFBundleDisplayName: SloppySafari
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        SFSafariCorrespondingIOSAppBundleIdentifier: team.sloppy.sloppysafari
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: SupportingFiles/WebExtension/iOS/SloppySafariWebExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.sloppysafari.webextension
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: SloppySafari

  SloppySafariWebExtension-visionOS:
    type: app-extension
    platform: visionOS
    sources:
      - Extension/Native
      - Extension/Resources
    info:
      path: SupportingFiles/WebExtension/visionOS/Info.plist
      properties:
        CFBundleDisplayName: SloppySafari
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        SFSafariCorrespondingIOSAppBundleIdentifier: team.sloppy.sloppysafari
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: SupportingFiles/WebExtension/visionOS/SloppySafariWebExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.sloppysafari.webextension
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: SloppySafari

schemes:
  SloppySafari-macOS:
    build:
      targets:
        SloppySafari-macOS: all
    run:
      config: Debug
      executable: SloppySafari-macOS
    archive:
      config: Release
